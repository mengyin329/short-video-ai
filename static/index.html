<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短视频AI编剧助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .model-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .model-selector label {
            font-size: 14px;
            opacity: 0.9;
        }

        .model-selector select {
            padding: 8px 15px;
            border-radius: 8px;
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
            cursor: pointer;
            outline: none;
        }

        .model-selector select option {
            background: #764ba2;
            color: white;
        }

        .config-btn {
            padding: 8px 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .config-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .message.assistant {
            align-self: flex-start;
            background: #f5f5f5;
            color: #333;
        }

        .input-area {
            padding: 20px 30px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 15px;
        }

        .input-area textarea {
            flex: 1;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 15px;
            resize: none;
            outline: none;
            font-family: inherit;
        }

        .input-area textarea:focus {
            border-color: #667eea;
        }

        .input-area button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .input-area button:hover {
            transform: scale(1.05);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 快捷按钮区域 */
        .quick-actions {
            padding: 15px 30px;
            background: #f9f9f9;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
        }

        .action-section {
            margin-bottom: 12px;
        }

        .action-section:last-child {
            margin-bottom: 0;
        }

        .action-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 8px 16px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .action-btn:hover {
            border-color: #667eea;
            color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }

        .action-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .action-btn.danger {
            border-color: #f56565;
            color: #f56565;
        }

        .action-btn.danger:hover {
            background: #f56565;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 短视频AI编剧助手</h1>
            <div class="model-selector">
                <label>当前模型：</label>
                <select id="modelSelect" onchange="changeModel()">
                    <optgroup label="OpenAI 系列">
                        <option value="gpt-4o">GPT-4o（推荐）</option>
                        <option value="gpt-4-turbo">GPT-4 Turbo</option>
                        <option value="gpt-3.5-turbo">GPT-3.5 Turbo</option>
                    </optgroup>
                    <optgroup label="豆包/火山引擎">
                        <option value="doubao-seed-2-0-pro-260215" selected>Doubao Seed Pro（推荐）</option>
                        <option value="doubao-pro-32k">Doubao Pro 32K</option>
                    </optgroup>
                    <optgroup label="DeepSeek">
                        <option value="deepseek-chat">DeepSeek Chat（推荐）</option>
                        <option value="deepseek-reasoner">DeepSeek Reasoner</option>
                    </optgroup>
                    <optgroup label="Kimi/月之暗面">
                        <option value="moonshot-v1-8k">Moonshot V1 8K</option>
                        <option value="moonshot-v1-32k">Moonshot V1 32K（推荐）</option>
                    </optgroup>
                </select>
                <div class="status-indicator">
                    <div class="status-dot" id="statusDot"></div>
                    <span id="statusText">未配置</span>
                </div>
                <button class="config-btn" onclick="goToWelcome()">⚙️ 配置API</button>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="message assistant">
                🎬 欢迎使用短视频AI编剧助手！
                <br><br>
                在使用之前，请先点击右上角的「配置API」按钮，配置你自己的大模型API。
                <br><br>
                配置完成后，你就可以：
                <br>• 创作完整的短视频剧本
                <br>• 生成专业的导演分镜表
                <br>• 输出可灵/即梦Prompt
                <br>• 自动生成分镜图
            </div>
        </div>

        <!-- 快捷按钮区域 -->
        <div class="quick-actions">
            <div class="action-section">
                <div class="action-label">🚀 快速开始</div>
                <div class="action-buttons">
                    <button class="action-btn primary" onclick="quickAction('创作剧本')">🎬 创作剧本</button>
                    <button class="action-btn" onclick="quickAction('生成分镜')">📋 生成分镜</button>
                    <button class="action-btn" onclick="quickAction('生成Prompt')">✍️ 生成Prompt</button>
                    <button class="action-btn" onclick="quickAction('生成分镜图')">🎨 生成分镜图</button>
                    <button class="action-btn danger" onclick="quickAction('清空对话')">🗑️ 清空对话</button>
                </div>
            </div>
            <div class="action-section">
                <div class="action-label">🎭 创作类型</div>
                <div class="action-buttons">
                    <button class="action-btn" onclick="quickAction('创作一个职场逆袭剧本')">💼 职场逆袭</button>
                    <button class="action-btn" onclick="quickAction('创作一个爱情故事')">❤️ 爱情故事</button>
                    <button class="action-btn" onclick="quickAction('创作一个悬疑推理剧本')">🔍 悬疑推理</button>
                    <button class="action-btn" onclick="quickAction('创作一个搞笑喜剧')">😄 搞笑喜剧</button>
                    <button class="action-btn" onclick="quickAction('创作一个商业广告')">💼 商业广告</button>
                    <button class="action-btn" onclick="quickAction('创作一个知识科普视频')">📚 知识科普</button>
                    <button class="action-btn" onclick="quickAction('创作一个情感治愈剧本')">🌈 情感治愈</button>
                    <button class="action-btn" onclick="quickAction('创作一个动作场景')">⚡ 动作场景</button>
                </div>
            </div>
            <div class="action-section">
                <div class="action-label">⏱️ 时长预设</div>
                <div class="action-buttons">
                    <button class="action-btn" onclick="quickAction('15秒')">15秒</button>
                    <button class="action-btn" onclick="quickAction('30秒')">30秒</button>
                    <button class="action-btn" onclick="quickAction('60秒')">60秒</button>
                    <button class="action-btn" onclick="quickAction('3分钟')">3分钟</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <textarea id="userInput" rows="3" placeholder="输入你的需求，例如：帮我创作一个30秒职场逆袭短视频"></textarea>
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        // 服务商默认配置
        const providerDefaults = {
            openai: {
                baseUrl: 'https://api.openai.com/v1',
                models: ['gpt-4o', 'gpt-4-turbo', 'gpt-3.5-turbo']
            },
            doubao: {
                baseUrl: 'https://ark.cn-beijing.volces.com/api/v3',
                models: ['doubao-seed-2-0-pro-260215', 'doubao-pro-32k']
            },
            deepseek: {
                baseUrl: 'https://api.deepseek.com/v1',
                models: ['deepseek-chat', 'deepseek-reasoner']
            },
            kimi: {
                baseUrl: 'https://api.moonshot.cn/v1',
                models: ['moonshot-v1-8k', 'moonshot-v1-32k']
            }
        };

        // 配置状态
        let config = {
            apiKey: '',
            baseUrl: '',
            model: 'doubao-seed-2-0-pro-260215',
            imageApiKey: '',
            imageBaseUrl: ''
        };

        // 会话ID
        let sessionId = 'session_' + Date.now();

        // 加载保存的配置
        function loadConfig() {
            const saved = localStorage.getItem('screenplay_agent_config');
            if (saved) {
                try {
                    config = JSON.parse(saved);
                    
                    // 兼容旧配置格式
                    if (!config.modelName && config.model) {
                        config.modelName = config.model;
                    }
                    if (!config.apiKey && config.api_key) {
                        config.apiKey = config.api_key;
                    }
                    
                    updateStatus();
                } catch (e) {
                    console.error('读取配置失败', e);
                }
            }
        }

        // 跳转到欢迎页
        function goToWelcome() {
            window.location.href = '/welcome.html';
        }

        // 保存配置
        function saveConfig() {
            config.apiKey = document.getElementById('apiKeyInput').value;
            config.baseUrl = document.getElementById('baseUrlInput').value;
            config.model = document.getElementById('modelSelect').value;
            config.modelName = config.model;
            config.imageApiKey = document.getElementById('imageApiKeyInput').value;
            config.imageBaseUrl = document.getElementById('imageBaseUrlInput').value;
            config.configured = true;

            localStorage.setItem('screenplay_agent_config', JSON.stringify(config));
            updateStatus();
            checkConfigStatus();
            closeConfig();
            
            addMessage('assistant', '✅ 配置已保存！你现在可以开始创作了。');
        }

        // 更新服务商默认值
        function updateProviderDefaults() {
            const provider = document.getElementById('providerSelect').value;
            if (providerDefaults[provider]) {
                document.getElementById('baseUrlInput').value = providerDefaults[provider].baseUrl;
                
                // 更新模型选择器
                const modelSelect = document.getElementById('modelSelect');
                const models = providerDefaults[provider].models;
                
                // 找到匹配的模型选项并选中
                for (let i = 0; i < modelSelect.options.length; i++) {
                    if (models.includes(modelSelect.options[i].value)) {
                        modelSelect.selectedIndex = i;
                        // 触发change事件
                        modelSelect.dispatchEvent(new Event('change'));
                        break;
                    }
                }
            }
        }

        // 更新状态显示
        function updateStatus() {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            const isConfigured = config.configured && config.apiKey && config.baseUrl;
            
            if (isConfigured) {
                dot.classList.remove('unconfigured');
                text.textContent = '已配置';
            } else {
                dot.classList.add('unconfigured');
                text.textContent = '未配置';
            }
        }

        // 切换模型
        function changeModel() {
            const newModel = document.getElementById('modelSelect').value;
            config.model = newModel;
            config.modelName = newModel;
            localStorage.setItem('screenplay_agent_config', JSON.stringify(config));
            
            addMessage('assistant', `🔄 已切换到模型：${newModel}\n\n新模型将在下次对话中生效。`);
        }

        // 快捷按钮操作
        function quickAction(action) {
            if (!config.apiKey || !config.baseUrl) {
                addMessage('assistant', '⚠️ 请先配置API Key和Base URL，点击右上角的「配置API」按钮。');
                return;
            }

            // 特殊处理清空对话
            if (action === '清空对话') {
                const chatArea = document.getElementById('chatArea');
                chatArea.innerHTML = `
                    <div class="message assistant">
                        🎬 对话已清空！
                        <br><br>
                        你可以重新开始创作，或者使用下方的快捷按钮快速开始。
                    </div>
                `;
                return;
            }

            // 时长预设按钮 - 需要结合上下文
            if (action === '15秒' || action === '30秒' || action === '60秒' || action === '3分钟') {
                const input = document.getElementById('userInput');
                const currentText = input.value.trim();
                if (currentText) {
                    input.value = currentText + '，时长' + action;
                } else {
                    input.value = '帮我创作一个' + action + '的短视频';
                }
                input.focus();
                return;
            }

            // 其他按钮 - 自动发送预设消息
            let message = '';
            switch(action) {
                case '创作剧本':
                    message = '我想开始创作剧本。请先引导我确定剧本类型、时长和主题。';
                    break;
                case '生成分镜':
                    message = '我想生成分镜。请告诉我需要提供什么内容？';
                    break;
                case '生成Prompt':
                    message = '我想生成视频Prompt。请告诉我需要提供什么内容？';
                    break;
                case '生成分镜图':
                    message = '我想生成分镜图。请告诉我需要提供什么内容？';
                    break;
                default:
                    message = action;
            }

            addMessage('user', message);
            
            // 立即发送请求
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = '处理中...';

            fetch('/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-user-api-key': config.apiKey,
                    'x-user-base-url': config.baseUrl,
                    'x-user-model': config.model,
                    'x-user-image-api-key': config.imageApiKey || '',
                    'x-user-image-base-url': config.imageBaseUrl || ''
                },
                body: JSON.stringify({
                    model: config.model,
                    messages: [
                        { role: 'user', content: message }
                    ],
                    stream: false
                })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                const assistantMessage = data.choices[0].message.content;
                addMessage('assistant', assistantMessage);
            })
            .catch(error => {
                console.error('Error:', error);
                addMessage('assistant', `❌ 发送失败：${error.message}\n\n请检查你的API配置是否正确。`);
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = '发送';
            });
        }

        // 添加消息到聊天区域
        function addMessage(role, content) {
            const chatArea = document.getElementById('chatArea');
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.textContent = content;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            if (!config.apiKey || !config.baseUrl) {
                addMessage('assistant', '⚠️ 请先配置API Key和Base URL，点击右上角的「配置API」按钮。');
                return;
            }

            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = '发送中...';

            addMessage('user', message);
            input.value = '';

            try {
                const response = await fetch('/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-user-api-key': config.apiKey,
                        'x-user-base-url': config.baseUrl,
                        'x-user-model': config.model,
                        'x-user-image-api-key': config.imageApiKey || '',
                        'x-user-image-base-url': config.imageBaseUrl || ''
                    },
                    body: JSON.stringify({
                        model: config.model,
                        messages: [
                            { role: 'user', content: message }
                        ],
                        stream: false
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const assistantMessage = data.choices[0].message.content;
                
                addMessage('assistant', assistantMessage);
            } catch (error) {
                console.error('Error:', error);
                addMessage('assistant', `❌ 发送失败：${error.message}\n\n请检查你的API配置是否正确。`);
            } finally {
                btn.disabled = false;
                btn.textContent = '发送';
            }
        }

        // 回车发送
        document.getElementById('userInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 页面初始化：检测配置状态
        window.onload = function() {
            loadConfig();
            
            // 检查是否已配置
            const isConfigured = config.configured && config.apiKey && config.baseUrl;
            
            // 如果未配置，跳转到欢迎页
            if (!isConfigured) {
                window.location.href = '/welcome.html';
            }
        };
    </script>
</body>
</html>
